<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor Management</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand fw-bold" href="#">
Hospital Management System
</a>

<div>

<a href="index.html" class="btn btn-light btn-sm">
Patients
</a>

<a href="Doctor.html" class="btn btn-light btn-sm">
Doctors
</a>

<a href="appointment.html" class="btn btn-light btn-sm">
Appointments
</a>

<button onclick="logout()" class="btn btn-danger btn-sm ms-2">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-4">

<div class="card shadow p-4 mb-4">

<h2 class="text-primary mb-4">Doctor Management</h2>

<input type="hidden" id="id">

<div class="row">

<div class="col-md-3">
<input type="text" id="name"
class="form-control"
placeholder="Enter Doctor Name">
</div>

<div class="col-md-3">
<input type="text" id="specialization"
class="form-control"
placeholder="Enter Specialization">
</div>

<div class="col-md-3">
<input type="text" id="phone"
class="form-control"
placeholder="Enter Phone">
</div>

<div class="col-md-2">
<button onclick="saveDoctor()"
class="btn btn-primary w-100">
Save Doctor
</button>
</div>

</div>

<h5 id="msg" class="text-success mt-3"></h5>

</div>

<table class="table table-bordered table-hover bg-white shadow">

<thead class="table-primary">
<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Phone</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

</div>

<script>

// Redirect to login if not logged in
if(!localStorage.getItem("loggedIn")){
    window.location.href="/login.html";
}

// Logout function
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href="/login.html";
}

async function saveDoctor(){

    const doctor = {

        id:document.getElementById("id").value,

        name:document.getElementById("name").value,

        specialization:document.getElementById("specialization").value,

        phone:document.getElementById("phone").value

    };

    await fetch("https://hospital-management-system-production-477c.up.railway.app/doctor/save",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(doctor)

    });

    document.getElementById("msg").innerHTML =
        "Doctor Saved Successfully";

    loadDoctors();

    document.getElementById("id").value="";
    document.getElementById("name").value="";
    document.getElementById("specialization").value="";
    document.getElementById("phone").value="";

}

async function loadDoctors(){

    const response =
        await fetch("https://hospital-management-system-production-477c.up.railway.app/doctor/all");

    const data = await response.json();

    let rows = "";

    data.forEach((d)=>{

        rows += `

        <tr>

        <td>${d.id}</td>
        <td>${d.name}</td>
        <td>${d.specialization}</td>
        <td>${d.phone}</td>

        <td>

        <button onclick="editDoctor(${d.id},
        '${d.name}',
        '${d.specialization}',
        '${d.phone}')"

        class="btn btn-success btn-sm">

        Edit

        </button>

        <button onclick="deleteDoctor(${d.id})"

        class="btn btn-danger btn-sm">

        Delete

        </button>

        </td>

        </tr>

        `;

    });

    document.getElementById("tableBody").innerHTML = rows;

}

async function deleteDoctor(id){

    await fetch("https://hospital-management-system-production-477c.up.railway.app/doctor/delete/" + id,{

        method:"DELETE"

    });

    document.getElementById("msg").innerHTML =
        "Doctor Deleted Successfully";

    loadDoctors();

}

function editDoctor(id, name, specialization, phone){

    document.getElementById("id").value=id;
    document.getElementById("name").value=name;
    document.getElementById("specialization").value=specialization;
    document.getElementById("phone").value=phone;

}

loadDoctors();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
