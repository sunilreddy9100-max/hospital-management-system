<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor Management</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
}

.container{
    width:90%;
    margin:auto;
    margin-top:30px;
}

.form-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    margin-bottom:30px;
}

input{
    width:220px;
    padding:10px;
    margin:10px;
}

button{
    padding:10px 20px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:darkblue;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
}

table, th, td{
    border:1px solid gray;
}

th, td{
    padding:12px;
    text-align:center;
}

th{
    background:blue;
    color:white;
}

</style>

</head>

<body>

<div class="container">

<div class="form-box">

<h1>Doctor Management</h1>

<input type="hidden" id="id">

<input type="text" id="name" placeholder="Enter Doctor Name">

<input type="text" id="specialization"
placeholder="Enter Specialization">

<input type="text" id="phone"
placeholder="Enter Phone">

<button onclick="saveDoctor()">Save Doctor</button>

<h3 id="msg"></h3>

</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Phone</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>

async function saveDoctor(){

    const doctor = {

        id:document.getElementById("id").value,

        name:document.getElementById("name").value,

        specialization:document.getElementById("specialization").value,

        phone:document.getElementById("phone").value

    };

    await fetch("http://localhost:9094/doctor/save",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(doctor)

    });

    document.getElementById("msg").innerHTML =
        "Doctor Saved Successfully";

    loadDoctors();

    document.getElementById("id").value="";
    document.getElementById("name").value="";
    document.getElementById("specialization").value="";
    document.getElementById("phone").value="";

}

async function loadDoctors(){

    const response =
        await fetch("http://localhost:9094/doctor/all");

    const data = await response.json();

    let rows = "";

    data.forEach((d)=>{

        rows += `

        <tr>

        <td>${d.id}</td>
        <td>${d.name}</td>
        <td>${d.specialization}</td>
        <td>${d.phone}</td>

        <td>

        <button onclick="editDoctor(${d.id},
        '${d.name}',
        '${d.specialization}',
        '${d.phone}')"

        style="background:green;color:white;
        padding:5px 10px;border:none;border-radius:5px;">

        Edit

        </button>

        <button onclick="deleteDoctor(${d.id})"

        style="background:red;color:white;
        padding:5px 10px;border:none;border-radius:5px;">

        Delete

        </button>

        </td>

        </tr>

        `;

    });

    document.getElementById("tableBody").innerHTML = rows;

}

async function deleteDoctor(id){

    await fetch("http://localhost:9094/doctor/delete/" + id,{

        method:"DELETE"

    });

    document.getElementById("msg").innerHTML =
        "Doctor Deleted Successfully";

    loadDoctors();

}

function editDoctor(id, name, specialization, phone){

    document.getElementById("id").value=id;
    document.getElementById("name").value=name;
    document.getElementById("specialization").value=specialization;
    document.getElementById("phone").value=phone;

}

loadDoctors();

</script>

</body>
</html>
