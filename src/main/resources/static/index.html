<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hospital Management System</title>

<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

<div class="container-fluid">

<a class="navbar-brand fw-bold" href="#">
Hospital Management System
</a>

<div>

<a href="index.html" class="btn btn-light btn-sm">
Patients
</a>

<a href="Doctor.html" class="btn btn-light btn-sm">
Doctors
</a>

<a href="appointment.html" class="btn btn-light btn-sm">
Appointments
</a>

<button onclick="logout()" class="btn btn-danger btn-sm ms-2">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-4">

<div class="card shadow p-4">

<h2 class="text-primary mb-4">

Patient Management

</h2>

<input type="hidden" id="id">

<div class="row">

<div class="col-md-3">

<input type="text"
id="name"
class="form-control"
placeholder="Enter Name">

</div>

<div class="col-md-2">

<input type="number"
id="age"
class="form-control"
placeholder="Enter Age">

</div>

<div class="col-md-3">

<input type="text"
id="disease"
class="form-control"
placeholder="Enter Disease">

</div>

<div class="col-md-3">

<input type="text"
id="phone"
class="form-control"
placeholder="Enter Phone">

</div>

<div class="col-md-1">

<button onclick="savePatient()"
class="btn btn-primary w-100">

Save

</button>

</div>

</div>

<h5 id="msg" class="text-success mt-3"></h5>

</div>

<div class="card shadow mt-4 p-3">
<div class="row mb-4">

<div class="col-md-4">

<div class="card text-white bg-primary shadow">

<div class="card-body">

<h5>Total Patients</h5>

<h2 id="patientCount">0</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-white bg-success shadow">

<div class="card-body">

<h5>Total Doctors</h5>

<h2 id="doctorCount">0</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-white bg-danger shadow">

<div class="card-body">

<h5>Total Appointments</h5>

<h2 id="appointmentCount">0</h2>

</div>

</div>

</div>

</div>

<h3 class="text-primary">

Patient Records

</h3>
<div class="mb-3">

<input type="text"
id="search"
class="form-control"
placeholder="Search Patient By Name"
onkeyup="searchPatient()">

</div>

<table class="table table-bordered table-hover mt-3">

<thead class="table-primary">

<tr>

<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Disease</th>
<th>Phone</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>
<div class="card shadow mt-4 p-4">

<h3 class="text-primary mb-4">

Hospital Analytics

</h3>

<canvas id="myChart"></canvas>

</div>


<script>

// Redirect to login if not logged in
if(!localStorage.getItem("loggedIn")){
    window.location.href="/login.html";
}

// Logout function
function logout(){
    localStorage.removeItem("loggedIn");
    window.location.href="/login.html";
}

async function savePatient(){

    const patient = {

        id:document.getElementById("id").value,

        name:document.getElementById("name").value,

        age:document.getElementById("age").value,

        disease:document.getElementById("disease").value,

        phone:document.getElementById("phone").value

    };

    await fetch("https://hospital-management-system-production-477c.up.railway.app/patient/save",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(patient)

    });

    document.getElementById("msg").innerHTML =
        "Patient Saved Successfully";

    loadPatients();
    loadDashboard();
    loadChart();

    document.getElementById("id").value="";
    document.getElementById("name").value="";
    document.getElementById("age").value="";
    document.getElementById("disease").value="";
    document.getElementById("phone").value="";

}

async function loadPatients(){

    const response =
    await fetch("https://hospital-management-system-production-477c.up.railway.app/patient/all");

    const data = await response.json();

    let rows = "";

    data.forEach((p)=>{

        rows += `

        <tr>

        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.age}</td>
        <td>${p.disease}</td>
        <td>${p.phone}</td>

        <td>

        <button onclick="editPatient(
        ${p.id},
        '${p.name}',
        ${p.age},
        '${p.disease}',
        '${p.phone}')"

        class="btn btn-success btn-sm">

        Edit

        </button>

        <button onclick="deletePatient(${p.id})"

        class="btn btn-danger btn-sm">

        Delete

        </button>

        </td>

        </tr>

        `;

    });

    document.getElementById("tableBody").innerHTML=rows;

}
async function loadDashboard(){

    const response =
    await fetch("https://hospital-management-system-production-477c.up.railway.app/dashboard/stats");

    const data = await response.json();

    document.getElementById("patientCount").innerHTML =
        data.patients;

    document.getElementById("doctorCount").innerHTML =
        data.doctors;

    document.getElementById("appointmentCount").innerHTML =
        data.appointments;

}

async function deletePatient(id){

    await fetch(
    "https://hospital-management-system-production-477c.up.railway.app/patient/delete/" + id,{

        method:"DELETE"

    });

    document.getElementById("msg").innerHTML =
        "Patient Deleted Successfully";

    loadPatients();
    loadDashboard();
    loadChart();

}

function editPatient(id, name, age, disease, phone){

    document.getElementById("id").value=id;

    document.getElementById("name").value=name;

    document.getElementById("age").value=age;

    document.getElementById("disease").value=disease;

    document.getElementById("phone").value=phone;

}

loadPatients();

loadDashboard();

loadChart();

async function searchPatient(){

    const name =
    document.getElementById("search").value;

    if(name === ""){

        loadPatients();

        return;

    }

    const response =
    await fetch(
    "https://hospital-management-system-production-477c.up.railway.app/patient/search/" + name);

    const data = await response.json();

    let rows = "";

    data.forEach((p)=>{

        rows += `

        <tr>

        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.age}</td>
        <td>${p.disease}</td>
        <td>${p.phone}</td>

        <td>

        <button onclick="editPatient(
        ${p.id},
        '${p.name}',
        ${p.age},
        '${p.disease}',
        '${p.phone}')"

        class="btn btn-success btn-sm">

        Edit

        </button>

        <button onclick="deletePatient(${p.id})"

        class="btn btn-danger btn-sm">

        Delete

        </button>

        </td>

        </tr>

        `;

    });

    document.getElementById("tableBody").innerHTML=rows;

}

let chart;

async function loadChart(){

    const response =
    await fetch("https://hospital-management-system-production-477c.up.railway.app/dashboard/stats");

    const data = await response.json();

    const ctx =
    document.getElementById("myChart");

    if(chart){

        chart.destroy();

    }

    chart = new Chart(ctx, {

        type: 'pie',

        data: {

            labels: [
                'Patients',
                'Doctors',
                'Appointments'
            ],

            datasets: [{

                data: [
                    data.patients,
                    data.doctors,
                    data.appointments
                ]

            }]

        }

    });

}
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
